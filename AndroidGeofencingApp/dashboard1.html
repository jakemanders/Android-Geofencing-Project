<!DOCTYPE html>
<html>
<head>
    <title>Live Geofence Dashboard</title>
    <style>
        #map {
            height: 100%;
        }
        html, body {
            height: 100%;
            margin:0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        let map;
        let markers = []; // Array to keep track of markers on the map

        // This function is called by the Google Maps script tag once it has loaded
        function initMap() {
            // The initial center of the map, same as your geofence
            const geofenceCenter = { lat: 40.997, lng: -75.173 };

            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 14,
                center: geofenceCenter,
            });

            // Draw the geofence circle on the map
            new google.maps.Circle({
                strokeColor: "#0000FF",
                strokeOpacity: 0.8,
                strokeWeight: 2,
                fillColor: "#0000FF",
                fillOpacity: 0.2,
                map,
                center: geofenceCenter,
                radius: 100, // Radius in meters
            });

            // Start polling the server for location updates
            fetchLocations(); // Fetch immediately
            setInterval(fetchLocations, 5000); // And then every 5 seconds
        }

        async function fetchLocations() {
            try {
                const response = await fetch("http://localhost:8080/getLocations");
                if (!response.ok) {
                    console.error("Failed to fetch locations from server.");
                    return;
                }
                const locations = await response.json();
                console.log("Received locations:", locations);
                updateMarkers(locations);
            } catch (error) {
                console.error("Error connecting to server:", error);
            }
        }

        function updateMarkers(locations) {
            // Clear all old markers from the map
            for (let i = 0; i < markers.length; i++) {
                markers[i].setMap(null);
            }
            markers = [];

            // Add a new marker for each device
            locations.forEach(device => {
                const position = { lat: device.latitude, lng: device.longitude };
                const marker = new google.maps.Marker({
                    position: position,
                    map: map,
                    title: `Device ID: ${device.deviceId}`,
                });
                markers.push(marker);
            });
        }
    </script>

    <!-- 
      ** IMPORTANT **
      Replace "YOUR_API_KEY_HERE" with your actual Google Maps API key.
    -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key="YOUR_API_KEY_HERE"&callback=initMap"></script>
</body>
</html>
